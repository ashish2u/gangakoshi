<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gangakoshi Kisan Tak</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Teko:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --g-dark: #0d2b18; --g-mid: #1a5c2e; --g-bright: #2d8a4e; --g-light: #4caf72;
    --gold: #f5a623; --gold-dim: rgba(245,166,35,0.35); --white: #ffffff;
  }
  html, body { width:100%; height:100vh; overflow:hidden; background:#060f07; font-family:'Poppins',sans-serif; }
  .page { display:flex; width:100vw; height:100vh; }

  /* ══ LEFT BRAND PANEL ══ */
  .brand-panel {
    width:33.333%; height:100vh; display:flex; flex-direction:column; align-items:center;
    background:linear-gradient(180deg,#061208 0%,#0d2b18 30%,#122a17 70%,#061208 100%);
    border-right:2px solid var(--gold); position:relative; overflow:hidden; flex-shrink:0;
  }
  .brand-panel::before {
    content:''; position:absolute; inset:0;
    background-image: linear-gradient(rgba(45,138,78,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(45,138,78,0.07) 1px,transparent 1px);
    background-size:32px 32px; pointer-events:none;
  }
  .brand-shimmer { position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--gold),transparent); background-size:200% 100%; animation:shimmer 3s linear infinite; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* TOP: logo + name */
  .brand-top { display:flex; flex-direction:column; align-items:center; gap:8px; padding:18px 16px 10px; z-index:2; width:100%; }
  .logo-wrap { position:relative; width:90px; height:90px; display:flex; align-items:center; justify-content:center; }
  .logo-ring { position:absolute; inset:0; border-radius:50%; border:2px solid transparent; border-top-color:var(--gold); border-right-color:rgba(245,166,35,0.3); animation:spin 6s linear infinite; }
  .logo-ring2 { position:absolute; inset:6px; border-radius:50%; border:1px solid transparent; border-bottom-color:var(--g-light); border-left-color:rgba(76,175,114,0.3); animation:spin 9s linear infinite reverse; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .logo-img { width:74px; height:74px; border-radius:50%; object-fit:cover; border:2px solid rgba(245,166,35,0.5); background:white; z-index:2; }
  .brand-name { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:clamp(20px,2.5vw,30px); color:var(--white); letter-spacing:2px; line-height:1.05; text-align:center; text-shadow:0 2px 16px rgba(0,0,0,0.5); }
  .brand-name .hl { color:var(--gold); }
  .brand-divider { width:70%; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin-top:2px; }

  /* MIDDLE: slideshow */
  .brand-slides { flex:1; width:100%; position:relative; overflow:hidden; z-index:2; }
  .bslide { position:absolute; inset:0; opacity:0; transition:opacity 1.2s ease; }
  .bslide.active { opacity:1; }
  .bslide svg { width:100%; height:100%; }
  .slide-dots { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); display:flex; gap:6px; z-index:5; }
  .sdot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.2); transition:background 0.3s,transform 0.3s; cursor:pointer; }
  .sdot.active { background:var(--gold); transform:scale(1.3); }

  /* BOTTOM: badges */
  .brand-badges { display:flex; flex-direction:column; gap:7px; padding:10px 14px 12px; width:100%; z-index:2; }
  .badge { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(245,166,35,0.25); border-left:3px solid var(--gold); border-radius:4px; padding:7px 12px; font-family:'Poppins',sans-serif; font-size:clamp(10px,1vw,12px); font-weight:500; color:rgba(255,255,255,0.85); letter-spacing:0.5px; }
  .badge-icon { font-size:15px; }
  .live-bar { display:flex; align-items:center; justify-content:center; gap:8px; padding:7px; border-top:1px solid rgba(245,166,35,0.2); z-index:2; width:100%; }
  .live-dot { width:7px; height:7px; border-radius:50%; background:#4cff8a; box-shadow:0 0 7px #4cff8a; animation:blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .live-text { font-family:'Poppins',sans-serif; font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:1.5px; text-transform:uppercase; }

  /* ══ RIGHT NEWS PANEL ══ */
  .news-panel { width:66.667%; height:100vh; display:flex; flex-direction:column; background:#0a1a0c; position:relative; overflow:hidden; }
  .news-header { background:linear-gradient(135deg,#0d2b18,#1a5c2e); padding:10px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--gold); flex-shrink:0; z-index:10; }
  .breaking-tag { background:#e63c2f; color:white; font-family:'Teko',sans-serif; font-size:16px; letter-spacing:2px; padding:4px 14px; border-radius:2px; text-transform:uppercase; font-weight:600; animation:blink-tag 2s step-end infinite; }
  @keyframes blink-tag { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .news-title-bar { font-family:'Rajdhani',sans-serif; font-size:18px; color:var(--gold); letter-spacing:3px; font-weight:600; }
  .news-clock { font-family:'Teko',sans-serif; font-size:16px; color:rgba(255,255,255,0.7); letter-spacing:1px; }
  .media-area { flex:1; position:relative; overflow:hidden; background:#060f07; display:flex; align-items:center; justify-content:center; }
  .media-bg-pattern { position:absolute; inset:0; background:radial-gradient(ellipse at 20% 80%,rgba(26,92,46,0.2) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(45,138,78,0.15) 0%,transparent 50%); pointer-events:none; z-index:0; }
  .media-grid-overlay { position:absolute; inset:0; background-image:linear-gradient(rgba(45,138,78,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(45,138,78,0.06) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .media-nav { position:absolute; top:50%; transform:translateY(-50%); z-index:6; background:rgba(0,0,0,0.45); border:1px solid var(--gold-dim); color:var(--gold); width:36px; height:60px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; transition:background 0.2s; border-radius:2px; }
  .media-nav:hover { background:rgba(245,166,35,0.25); }
  .media-nav.left{left:10px;} .media-nav.right{right:10px;}
  .media-display { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:2; }
  .media-item { width:100%; height:100%; object-fit:cover; transition:opacity 0.8s ease; }
  .media-video { width:100%; height:100%; object-fit:cover; }
  .empty-state { display:flex; flex-direction:column; align-items:center; gap:16px; z-index:3; text-align:center; }
  .empty-icon { width:80px; height:80px; border:2px dashed rgba(245,166,35,0.4); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; color:rgba(245,166,35,0.4); animation:pulse-ring 2s ease-in-out infinite; }
  @keyframes pulse-ring { 0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,0.2)} 50%{box-shadow:0 0 0 12px rgba(245,166,35,0)} }
  .empty-text { font-family:'Poppins',sans-serif; font-size:13px; color:rgba(255,255,255,0.35); }
  .controls-bar { background:linear-gradient(135deg,#0d2b18,#162a1c); padding:10px 16px; display:flex; align-items:center; gap:12px; border-top:2px solid var(--gold); flex-shrink:0; z-index:10; }
  .upload-btn { display:flex; align-items:center; gap:8px; background:linear-gradient(135deg,#2d8a4e,#1a5c2e); border:1px solid var(--gold); color:white; padding:8px 18px; border-radius:3px; cursor:pointer; font-family:'Poppins',sans-serif; font-size:12px; font-weight:500; letter-spacing:0.5px; transition:background 0.2s,transform 0.1s; white-space:nowrap; }
  .upload-btn:hover { background:linear-gradient(135deg,#4caf72,#2d8a4e); transform:translateY(-1px); }
  .upload-btn svg { width:14px; height:14px; flex-shrink:0; }
  #file-input { display:none; }
  .ctrl-btn { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); width:32px; height:32px; border-radius:3px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; transition:background 0.2s,color 0.2s; }
  .ctrl-btn:hover,.ctrl-btn.active { background:rgba(245,166,35,0.15); color:var(--gold); border-color:var(--gold); }
  .speed-select { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); padding:4px 8px; border-radius:3px; font-size:11px; font-family:'Poppins',sans-serif; cursor:pointer; outline:none; }
  .speed-select:focus{border-color:var(--gold);}
  .ticker-bar { background:#1a5c2e; border-top:2px solid var(--gold); display:flex; align-items:stretch; overflow:hidden; height:38px; flex-shrink:0; z-index:10; }
  .ticker-label { background:var(--gold); color:#0d2b18; padding:0 16px; font-family:'Teko',sans-serif; font-size:17px; font-weight:600; letter-spacing:1px; display:flex; align-items:center; white-space:nowrap; flex-shrink:0; }
  .ticker-scroll { flex:1; overflow:hidden; display:flex; align-items:center; }
  .ticker-inner { display:flex; gap:0; white-space:nowrap; animation:ticker-move 40s linear infinite; }
  .ticker-inner:hover{animation-play-state:paused;}
  @keyframes ticker-move { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .ticker-item { display:inline-flex; align-items:center; gap:8px; padding:0 28px; font-family:'Poppins',sans-serif; font-size:12px; color:rgba(255,255,255,0.85); border-right:1px solid rgba(255,255,255,0.1); }
  .tdot { width:5px; height:5px; border-radius:50%; background:var(--gold); flex-shrink:0; }
</style>
</head>
<body>
<div class="page">

  <!-- ═══ LEFT BRAND PANEL ═══ -->
  <div class="brand-panel">

    <!-- TOP: spinning logo + name -->
    <div class="brand-top">
      <div class="logo-wrap">
        <div class="logo-ring"></div>
        <div class="logo-ring2"></div>
        <img class="logo-img" src="Image/logo.png" alt="logo"
          onerror="this.style.display='none'">
      </div>
      <div class="brand-name">GANGAKOSHI<br><span class="hl">KISAN TAK</span></div>
      <div class="brand-divider"></div>
    </div>

    <!-- MIDDLE: 5 SVG crop/drone slides -->
    <div class="brand-slides" id="brandSlides">

      <!-- SLIDE 1: Paddy field -->
      <div class="bslide active">
        <svg viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="sg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a3d1f"/><stop offset="100%" stop-color="#1a7a3c"/></linearGradient>
            <linearGradient id="wg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a5c7a"/><stop offset="100%" stop-color="#0a2d3d"/></linearGradient>
          </defs>
          <rect width="300" height="320" fill="url(#sg1)"/>
          <!-- sun -->
          <circle cx="255" cy="50" r="28" fill="#f5a623" opacity="0.18"/>
          <circle cx="255" cy="50" r="16" fill="#f5a623" opacity="0.3"/>
          <circle cx="255" cy="50" r="10" fill="#ffe082"/>
          <!-- mountains -->
          <polygon points="0,145 55,75 110,135 175,65 240,115 300,80 300,145" fill="rgba(13,43,24,0.55)"/>
          <!-- water -->
          <rect x="0" y="200" width="300" height="120" fill="url(#wg1)" opacity="0.45"/>
          <!-- paddy stalks row1 -->
          <g fill="#2d8a4e">
            <ellipse cx="15" cy="196" rx="3" ry="20"/><ellipse cx="38" cy="193" rx="3" ry="22"/>
            <ellipse cx="61" cy="196" rx="3" ry="20"/><ellipse cx="84" cy="192" rx="3" ry="23"/>
            <ellipse cx="107" cy="196" rx="3" ry="20"/><ellipse cx="130" cy="193" rx="3" ry="22"/>
            <ellipse cx="153" cy="196" rx="3" ry="20"/><ellipse cx="176" cy="192" rx="3" ry="23"/>
            <ellipse cx="199" cy="196" rx="3" ry="20"/><ellipse cx="222" cy="193" rx="3" ry="22"/>
            <ellipse cx="245" cy="196" rx="3" ry="20"/><ellipse cx="268" cy="192" rx="3" ry="23"/>
            <ellipse cx="291" cy="196" rx="3" ry="20"/>
          </g>
          <!-- grain heads row1 -->
          <g fill="#c8a84b" opacity="0.9">
            <ellipse cx="15" cy="177" rx="2" ry="7" transform="rotate(14 15 177)"/>
            <ellipse cx="38" cy="173" rx="2" ry="7" transform="rotate(-10 38 173)"/>
            <ellipse cx="61" cy="177" rx="2" ry="7" transform="rotate(12 61 177)"/>
            <ellipse cx="84" cy="171" rx="2" ry="7" transform="rotate(-9 84 171)"/>
            <ellipse cx="107" cy="177" rx="2" ry="7" transform="rotate(14 107 177)"/>
            <ellipse cx="130" cy="173" rx="2" ry="7" transform="rotate(-11 130 173)"/>
            <ellipse cx="153" cy="177" rx="2" ry="7" transform="rotate(12 153 177)"/>
            <ellipse cx="176" cy="171" rx="2" ry="7" transform="rotate(-9 176 171)"/>
            <ellipse cx="199" cy="177" rx="2" ry="7" transform="rotate(13 199 177)"/>
            <ellipse cx="222" cy="173" rx="2" ry="7" transform="rotate(-10 222 173)"/>
            <ellipse cx="245" cy="177" rx="2" ry="7" transform="rotate(12 245 177)"/>
            <ellipse cx="268" cy="171" rx="2" ry="7" transform="rotate(-9 268 171)"/>
          </g>
          <!-- paddy stalks row2 -->
          <g fill="#1a7a3c">
            <ellipse cx="8" cy="228" rx="3.5" ry="24"/><ellipse cx="32" cy="224" rx="3.5" ry="26"/>
            <ellipse cx="56" cy="228" rx="3.5" ry="24"/><ellipse cx="80" cy="223" rx="3.5" ry="27"/>
            <ellipse cx="104" cy="227" rx="3.5" ry="24"/><ellipse cx="128" cy="224" rx="3.5" ry="26"/>
            <ellipse cx="152" cy="228" rx="3.5" ry="24"/><ellipse cx="176" cy="222" rx="3.5" ry="27"/>
            <ellipse cx="200" cy="226" rx="3.5" ry="24"/><ellipse cx="224" cy="223" rx="3.5" ry="26"/>
            <ellipse cx="248" cy="227" rx="3.5" ry="24"/><ellipse cx="272" cy="222" rx="3.5" ry="27"/>
            <ellipse cx="295" cy="226" rx="3.5" ry="24"/>
          </g>
          <!-- grain heads row2 -->
          <g fill="#e2b84a" opacity="0.9">
            <ellipse cx="8" cy="205" rx="2.5" ry="8" transform="rotate(13 8 205)"/>
            <ellipse cx="32" cy="200" rx="2.5" ry="8" transform="rotate(-9 32 200)"/>
            <ellipse cx="56" cy="205" rx="2.5" ry="8" transform="rotate(12 56 205)"/>
            <ellipse cx="80" cy="198" rx="2.5" ry="8" transform="rotate(-10 80 198)"/>
            <ellipse cx="104" cy="204" rx="2.5" ry="8" transform="rotate(13 104 204)"/>
            <ellipse cx="128" cy="200" rx="2.5" ry="8" transform="rotate(-9 128 200)"/>
            <ellipse cx="152" cy="205" rx="2.5" ry="8" transform="rotate(12 152 205)"/>
            <ellipse cx="176" cy="198" rx="2.5" ry="8" transform="rotate(-10 176 198)"/>
            <ellipse cx="200" cy="203" rx="2.5" ry="8" transform="rotate(12 200 203)"/>
            <ellipse cx="224" cy="199" rx="2.5" ry="8" transform="rotate(-9 224 199)"/>
            <ellipse cx="248" cy="204" rx="2.5" ry="8" transform="rotate(13 248 204)"/>
          </g>
          <!-- water reflections -->
          <line x1="0" y1="248" x2="300" y2="248" stroke="rgba(100,180,220,0.18)" stroke-width="1"/>
          <line x1="0" y1="268" x2="300" y2="268" stroke="rgba(100,180,220,0.12)" stroke-width="1"/>
          <!-- caption -->
          <rect x="0" y="282" width="300" height="38" fill="rgba(6,14,7,0.8)"/>
          <text x="150" y="305" text-anchor="middle" font-family="'Rajdhani',sans-serif" font-size="15" font-weight="700" fill="#f5a623" letter-spacing="3">🌾 PADDY HARVEST</text>
        </svg>
      </div>

      <!-- SLIDE 2: Maize field -->
      <div class="bslide">
        <svg viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="sg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#112a17"/><stop offset="100%" stop-color="#1f6b2e"/></linearGradient>
          </defs>
          <rect width="300" height="320" fill="url(#sg2)"/>
          <ellipse cx="150" cy="130" rx="150" ry="35" fill="rgba(245,166,35,0.07)"/>
          <!-- stalks -->
          <g fill="#1a6b2e" stroke="#145524" stroke-width="0.5">
            <rect x="14" y="52" width="7" height="160" rx="2"/><rect x="48" y="48" width="7" height="164" rx="2"/>
            <rect x="82" y="54" width="7" height="158" rx="2"/><rect x="116" y="50" width="7" height="162" rx="2"/>
            <rect x="150" y="52" width="7" height="160" rx="2"/><rect x="184" y="48" width="7" height="164" rx="2"/>
            <rect x="218" y="53" width="7" height="159" rx="2"/><rect x="252" y="50" width="7" height="162" rx="2"/>
            <rect x="286" y="55" width="7" height="157" rx="2"/>
          </g>
          <!-- leaves -->
          <g fill="#2d8a4e" opacity="0.75">
            <ellipse cx="17" cy="95" rx="20" ry="5.5" transform="rotate(-28 17 95)"/>
            <ellipse cx="17" cy="128" rx="22" ry="5.5" transform="rotate(24 17 128)"/>
            <ellipse cx="51" cy="90" rx="20" ry="5.5" transform="rotate(26 51 90)"/>
            <ellipse cx="51" cy="122" rx="22" ry="5.5" transform="rotate(-24 51 122)"/>
            <ellipse cx="85" cy="95" rx="20" ry="5.5" transform="rotate(-28 85 95)"/>
            <ellipse cx="85" cy="128" rx="22" ry="5.5" transform="rotate(24 85 128)"/>
            <ellipse cx="119" cy="90" rx="20" ry="5.5" transform="rotate(26 119 90)"/>
            <ellipse cx="119" cy="122" rx="22" ry="5.5" transform="rotate(-24 119 122)"/>
            <ellipse cx="153" cy="95" rx="20" ry="5.5" transform="rotate(-28 153 95)"/>
            <ellipse cx="153" cy="128" rx="22" ry="5.5" transform="rotate(24 153 128)"/>
            <ellipse cx="187" cy="90" rx="20" ry="5.5" transform="rotate(26 187 90)"/>
            <ellipse cx="187" cy="122" rx="22" ry="5.5" transform="rotate(-24 187 122)"/>
            <ellipse cx="221" cy="95" rx="20" ry="5.5" transform="rotate(-28 221 95)"/>
            <ellipse cx="221" cy="128" rx="22" ry="5.5" transform="rotate(24 221 128)"/>
            <ellipse cx="255" cy="90" rx="20" ry="5.5" transform="rotate(26 255 90)"/>
            <ellipse cx="255" cy="122" rx="22" ry="5.5" transform="rotate(-24 255 122)"/>
          </g>
          <!-- cobs -->
          <g fill="#e8b84a" stroke="#c8920a" stroke-width="0.5">
            <rect x="19" y="120" width="9" height="22" rx="4.5"/>
            <rect x="53" y="116" width="9" height="22" rx="4.5"/>
            <rect x="87" y="120" width="9" height="22" rx="4.5"/>
            <rect x="121" y="115" width="9" height="22" rx="4.5"/>
            <rect x="155" y="120" width="9" height="22" rx="4.5"/>
            <rect x="189" y="116" width="9" height="22" rx="4.5"/>
            <rect x="223" y="119" width="9" height="22" rx="4.5"/>
            <rect x="257" y="115" width="9" height="22" rx="4.5"/>
          </g>
          <!-- tassels -->
          <g stroke="#f0d060" stroke-width="1.8" opacity="0.7">
            <line x1="17" y1="52" x2="13" y2="34"/><line x1="17" y1="52" x2="21" y2="32"/>
            <line x1="51" y1="48" x2="47" y2="29"/><line x1="51" y1="48" x2="55" y2="27"/>
            <line x1="85" y1="54" x2="81" y2="35"/><line x1="85" y1="54" x2="89" y2="33"/>
            <line x1="119" y1="50" x2="115" y2="31"/><line x1="119" y1="50" x2="123" y2="29"/>
            <line x1="153" y1="52" x2="149" y2="33"/><line x1="153" y1="52" x2="157" y2="31"/>
            <line x1="187" y1="48" x2="183" y2="29"/><line x1="187" y1="48" x2="191" y2="27"/>
            <line x1="221" y1="53" x2="217" y2="34"/><line x1="221" y1="53" x2="225" y2="32"/>
            <line x1="255" y1="50" x2="251" y2="31"/><line x1="255" y1="50" x2="259" y2="29"/>
          </g>
          <!-- ground -->
          <rect x="0" y="210" width="300" height="110" fill="#0a2010"/>
          <g stroke="rgba(45,138,78,0.25)" stroke-width="1">
            <line x1="0" y1="224" x2="300" y2="224"/><line x1="0" y1="244" x2="300" y2="244"/>
            <line x1="0" y1="264" x2="300" y2="264"/>
          </g>
          <rect x="0" y="282" width="300" height="38" fill="rgba(6,14,7,0.8)"/>

    const inner = document.getElementById('ticker-inner');
    let h = '';
    for(let i=0;i<2;i++) msgs.forEach(m=>h+=`<span class="ticker-item"><span class="tdot"></span>${m}</span>`);
    inner.innerHTML=h;
  })();

  // RIGHT PANEL
  const mediaFiles=[]; let ci=0,autoplay=true,stimer=null,spd=5000;
  function handleFiles(files){
    if(!files||!files.length)return;
    mediaFiles.length=0; ci=0;
    Array.from(files).forEach(f=>mediaFiles.push({file:f,url:URL.createObjectURL(f),type:f.type.startsWith('video')?'video':'image',name:f.name}));
    showMedia(0);
    if(autoplay)startSS();
  }
  function showMedia(idx){
    if(!mediaFiles.length)return;
    ci=(idx+mediaFiles.length)%mediaFiles.length;
    const m=mediaFiles[ci];
    const disp=document.getElementById('media-display');
    const empty=document.getElementById('empty-state');
    empty.style.display='none'; disp.innerHTML=''; disp.appendChild(empty);
    if(m.type==='image'){
      const img=document.createElement('img'); img.src=m.url; img.className='media-item'; img.style.opacity='0';
      disp.appendChild(img); setTimeout(()=>img.style.opacity='1',50);
    } else {
      const vid=document.createElement('video'); vid.src=m.url; vid.className='media-video'; vid.controls=true; vid.autoplay=true;
      disp.appendChild(vid);
    }
  }
  function navigateMedia(dir){if(!mediaFiles.length)return;stopSS();showMedia(ci+dir);if(autoplay)startSS();}
  function startSS(){stopSS();if(mediaFiles.length>1)stimer=setInterval(()=>showMedia(ci+1),spd);}
  function stopSS(){if(stimer){clearInterval(stimer);stimer=null;}}
  function toggleAutoplay(){
    autoplay=!autoplay;
    const b=document.getElementById('play-ctrl'); b.textContent=autoplay?'⏸':'▶'; b.classList.toggle('active',autoplay);
    autoplay?startSS():stopSS();
  }
  function updateSpeed(v){spd=parseInt(v);if(autoplay&&mediaFiles.length>1)startSS();}
</script>
</body>
</html>
