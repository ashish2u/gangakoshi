<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gangakoshi Kisan Tak</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Teko:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

/* ═══════════════════════════════════════════════
   VARIABLES
═══════════════════════════════════════════════ */
:root{
  --gold:        #f5a623;
  --gold-dim:    rgba(245,166,35,0.45);
  --g-dark:      #1b5e20;
  --g-mid:       #388e3c;
  --g-bright:    #43a047;
  --g-light:     #81c784;
  --g-pale:      #c8e6c9;
  --white:       #ffffff;

  /* panel backgrounds */
  --bg-left:     linear-gradient(175deg,#a5d6a7 0%,#66bb6a 25%,#43a047 60%,#2e7d32 100%);
  --bg-right:    #f1f8e9;
  --bg-page:     #e8f5e9;
  --bg-header:   linear-gradient(135deg,#2e7d32,#66bb6a);
  --bg-controls: linear-gradient(135deg,#388e3c,#2e7d32);
  --bg-ticker:   #388e3c;
  --bg-media:    #dcedc8;

  /* header height — used to compute product box fill */
  --header-h:    52px;
  --controls-h:  52px;
  --ticker-h:    40px;
}

/* ═══════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════ */
html,body{
  width:100%;height:100%;
  font-family:'Poppins',sans-serif;
  background:var(--bg-page);
  overflow:hidden; /* desktop: no scroll */
}

/* ═══════════════════════════════════════════════
   PAGE — 2 columns, full viewport
═══════════════════════════════════════════════ */
.page{
  display:flex;
  flex-direction:row;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* ═══════════════════════════════════════════════
   ██  LEFT BRAND PANEL  (1/3)
═══════════════════════════════════════════════ */
.brand-panel{
  width:33.333%;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg-left);
  border-right:3px solid var(--gold);
  position:relative;
  overflow:hidden;
  flex-shrink:0;
  z-index:1;
}

/* subtle grid overlay */
.brand-panel::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,0.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.055) 1px,transparent 1px);
  background-size:28px 28px;
}

/* gold shimmer line at bottom */
.brand-shimmer{
  position:absolute;bottom:0;left:0;right:0;height:3px;z-index:10;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ───────────────────────────────────────────
   TOP BAR:  logo (left) + brand name (center)
─────────────────────────────────────────── */
.brand-top{
  width:100%;
  flex-shrink:0;
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:0;
  padding:10px 12px 8px 12px;
  z-index:2;
  position:relative;
  /* gold separator at bottom */
  border-bottom:1px solid rgba(245,166,35,0.35);
}

/* logo sits at left edge */
.logo-wrap{
  position:relative;
  flex-shrink:0;
  width:clamp(62px,10vw,96px);
  height:clamp(62px,10vw,96px);
  display:flex;align-items:center;justify-content:center;
}
.logo-ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid transparent;
  border-top-color:var(--gold);
  border-right-color:rgba(245,166,35,0.28);
  animation:spin 7s linear infinite;
}
.logo-ring2{
  position:absolute;inset:6px;border-radius:50%;
  border:1.5px solid transparent;
  border-bottom-color:rgba(255,255,255,0.5);
  border-left-color:rgba(255,255,255,0.18);
  animation:spin 10s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-img{
  width:84%;height:84%;border-radius:50%;
  object-fit:cover;
  border:2.5px solid rgba(245,166,35,0.75);
  background:white;z-index:2;
  box-shadow:0 3px 16px rgba(0,0,0,0.28);
}

/* brand name fills remaining width, centred */
.brand-name-wrap{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 8px 0 10px;
  text-align:center;
}
.brand-name{
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:clamp(17px,3.2vw,32px);
  color:var(--white);
  letter-spacing:2px;line-height:1.1;
  text-align:center;
  text-shadow:0 2px 10px rgba(0,0,0,0.35);
  white-space:nowrap;
}
.brand-name .hl{color:var(--gold);}
.brand-tagline{
  font-family:'Teko',sans-serif;
  font-size:clamp(10px,1.4vw,13px);
  color:rgba(255,255,255,0.65);
  letter-spacing:2px;text-transform:uppercase;
  margin-top:2px;
}
.brand-divider{
  width:80%;height:1.5px;margin-top:4px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* ───────────────────────────────────────────
   PRODUCT BOX — flex:1 so it fills ALL
   remaining height between header and badges
─────────────────────────────────────────── */
.prod-box-wrap{
  flex:1;              /* ← takes all remaining vertical space */
  width:100%;
  display:flex;
  align-items:stretch;
  padding:8px 10px;
  z-index:2;
  min-height:0;        /* allow flex child to shrink below content */
}
.prod-box{
  width:100%;
  position:relative;
  overflow:hidden;
  border-radius:10px;
  border:2px solid rgba(245,166,35,0.6);
  box-shadow:0 4px 20px rgba(0,0,0,0.28),inset 0 0 0 1px rgba(255,255,255,0.08);
  background:#1b5e20;
  /* NO min-height needed — flex:1 on parent handles height */
}

/* individual product slides — fill box completely */
.prod-slide{
  position:absolute;inset:0;
  opacity:0;
  transition:opacity 1.1s ease;
}
.prod-slide.active{opacity:1;}
.prod-slide img{
  width:100%;height:100%;
  object-fit:cover;   /* fills the box, crops if needed */
  display:block;
  border-radius:8px;
}

/* "Our Products" top label */
.prod-box-label{
  position:absolute;top:0;left:0;right:0;
  background:linear-gradient(rgba(27,94,32,0.82),transparent);
  padding:8px 10px 20px;
  font-family:'Teko',sans-serif;
  font-size:clamp(12px,1.8vw,16px);
  color:var(--gold);letter-spacing:2px;
  text-transform:uppercase;text-align:center;
  z-index:4;pointer-events:none;
}

/* caption at bottom */
.prod-caption{
  position:absolute;bottom:22px;left:0;right:0;
  background:linear-gradient(transparent,rgba(27,94,32,0.82));
  padding:18px 10px 6px;
  font-family:'Teko',sans-serif;
  font-size:clamp(12px,2vw,17px);
  color:var(--gold);letter-spacing:1.5px;
  text-transform:uppercase;text-align:center;
  z-index:4;pointer-events:none;
}

/* prev/next arrows */
.prod-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  z-index:5;
  background:rgba(27,94,32,0.55);
  border:1px solid var(--gold-dim);
  color:var(--gold);
  width:26px;height:48px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;border-radius:3px;
  transition:background 0.2s;user-select:none;
}
.prod-nav:hover,.prod-nav:active{background:rgba(245,166,35,0.35);}
.prod-nav.left{left:5px;}.prod-nav.right{right:5px;}

/* dots */
.prod-dots{
  position:absolute;bottom:6px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:5px;z-index:5;
  flex-wrap:wrap;justify-content:center;max-width:88%;
}
.pdot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.3);
  transition:background 0.3s,transform 0.3s;
  cursor:pointer;flex-shrink:0;
}
.pdot.active{background:var(--gold);transform:scale(1.4);}

/* no-images placeholder */
.no-products{
  position:absolute;inset:0;
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:16px;text-align:center;z-index:3;
}
.no-products .np-icon{font-size:clamp(34px,6vw,50px);line-height:1;}
.no-products p{
  font-family:'Poppins',sans-serif;
  font-size:clamp(9px,1.4vw,11px);
  color:rgba(255,255,255,0.7);line-height:1.6;
}
.no-products code{
  background:rgba(0,0,0,0.2);border-radius:4px;
  padding:1px 5px;font-size:0.88em;
  color:var(--gold);word-break:break-all;
}

/* ───────────────────────────────────────────
   BADGES  (bottom of left panel)
─────────────────────────────────────────── */
.brand-badges{
  width:100%;flex-shrink:0;z-index:2;
  display:flex;flex-direction:column;
  gap:5px;padding:6px 10px 8px;
}
.badge{
  display:flex;align-items:center;gap:9px;
  background:rgba(255,255,255,0.13);
  border:1px solid rgba(245,166,35,0.28);
  border-left:3px solid var(--gold);
  border-radius:5px;padding:5px 11px;
  font-family:'Poppins',sans-serif;
  font-size:clamp(9px,1.1vw,12px);
  font-weight:500;color:var(--white);letter-spacing:0.4px;
}
.badge-icon{font-size:13px;}

/* live bar */
.live-bar{
  flex-shrink:0;width:100%;
  display:flex;align-items:center;justify-content:center;
  gap:8px;padding:5px 12px 7px;
  border-top:1px solid rgba(245,166,35,0.22);
  z-index:2;
}
.live-dot{
  width:8px;height:8px;border-radius:50%;
  background:#69ff99;box-shadow:0 0 8px #69ff99;
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.18}}
.live-text{
  font-family:'Poppins',sans-serif;font-size:9px;
  color:rgba(255,255,255,0.55);letter-spacing:1.5px;text-transform:uppercase;
}

/* ═══════════════════════════════════════════════
   ██  RIGHT NEWS PANEL  (2/3)
═══════════════════════════════════════════════ */
.news-panel{
  width:66.667%;
  height:100vh;
  display:flex;flex-direction:column;
  background:var(--bg-right);
  overflow:hidden;
}

/* ── Top header bar ── */
.news-header{
  flex-shrink:0;
  background:var(--bg-header);
  padding:8px 16px;
  display:flex;align-items:center;
  justify-content:space-between;
  border-bottom:2px solid var(--gold);
  z-index:10;gap:8px;flex-wrap:nowrap;
  min-height:var(--header-h);
}
.breaking-tag{
  background:#e53935;color:var(--white);
  font-family:'Teko',sans-serif;
  font-size:clamp(12px,1.8vw,15px);
  letter-spacing:2px;padding:3px 11px;
  border-radius:3px;text-transform:uppercase;
  font-weight:600;white-space:nowrap;flex-shrink:0;
  animation:blink-tag 2s step-end infinite;
}
@keyframes blink-tag{0%,100%{opacity:1}50%{opacity:0.5}}
.news-title-bar{
  font-family:'Rajdhani',sans-serif;
  font-size:clamp(13px,2vw,18px);
  color:var(--gold);letter-spacing:2px;
  font-weight:600;flex:1;
  text-align:center;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
.news-clock{
  font-family:'Teko',sans-serif;
  font-size:clamp(13px,1.7vw,17px);
  color:rgba(255,255,255,0.85);
  letter-spacing:1px;white-space:nowrap;flex-shrink:0;
}

/* ── Media display area — flex:1 fills all space ── */
.media-area{
  flex:1;position:relative;overflow:hidden;
  background:var(--bg-media);
  display:flex;align-items:center;justify-content:center;
  min-height:0;
}
.media-bg{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 18% 82%,rgba(76,175,80,0.14) 0%,transparent 52%),
    radial-gradient(ellipse at 82% 18%,rgba(129,199,132,0.1) 0%,transparent 52%);
}
.media-grid{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(56,142,60,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,142,60,0.07) 1px,transparent 1px);
  background-size:38px 38px;
}
.media-nav-r{
  position:absolute;top:50%;transform:translateY(-50%);
  z-index:6;background:rgba(27,94,32,0.52);
  border:1px solid var(--gold-dim);color:var(--gold);
  width:clamp(28px,4.5vw,40px);height:clamp(50px,8vw,70px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:clamp(16px,2.5vw,22px);
  transition:background 0.2s;border-radius:3px;
  user-select:none;-webkit-user-select:none;
}
.media-nav-r:hover,.media-nav-r:active{background:rgba(245,166,35,0.32);}
.media-nav-r.left{left:8px;}.media-nav-r.right{right:8px;}

.media-display{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;z-index:2;
}
.media-item{
  width:100%;height:100%;
  object-fit:cover;
  transition:opacity 0.8s ease;
}
.media-video{width:100%;height:100%;object-fit:cover;}

.empty-state{
  display:flex;flex-direction:column;
  align-items:center;gap:14px;z-index:3;
  text-align:center;padding:20px;
}
.empty-icon{
  width:clamp(56px,9vw,78px);height:clamp(56px,9vw,78px);
  border:2px dashed rgba(56,142,60,0.5);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(20px,4vw,32px);color:var(--g-mid);
  animation:pulse-ring 2s ease-in-out infinite;
}
@keyframes pulse-ring{
  0%,100%{box-shadow:0 0 0 0 rgba(56,142,60,0.2)}
  50%{box-shadow:0 0 0 12px rgba(56,142,60,0)}
}
.empty-text{
  font-family:'Poppins',sans-serif;
  font-size:clamp(11px,1.8vw,14px);color:var(--g-mid);line-height:1.5;
}

/* ── Controls bar ── */
.controls-bar{
  flex-shrink:0;
  background:var(--bg-controls);
  padding:9px 14px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  border-top:2px solid var(--gold);
  z-index:10;
  min-height:var(--controls-h);
}
.upload-btn{
  display:flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,#66bb6a,#2e7d32);
  border:1px solid var(--gold);color:var(--white);
  padding:7px 15px;border-radius:4px;cursor:pointer;
  font-family:'Poppins',sans-serif;
  font-size:clamp(11px,1.4vw,13px);font-weight:500;
  letter-spacing:0.4px;white-space:nowrap;
  transition:background 0.2s,transform 0.1s;user-select:none;
}
.upload-btn:hover{background:linear-gradient(135deg,#81c784,#388e3c);transform:translateY(-1px);}
.upload-btn:active{transform:translateY(0);}
.upload-btn svg{width:13px;height:13px;flex-shrink:0;}
#fileInput{display:none;}

.slide-controls{display:flex;align-items:center;gap:6px;}
.ctrl-btn{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.22);
  color:rgba(255,255,255,0.85);
  width:clamp(29px,4.5vw,35px);height:clamp(29px,4.5vw,35px);
  border-radius:4px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:clamp(11px,1.8vw,15px);
  transition:background 0.2s,color 0.2s;user-select:none;
}
.ctrl-btn:hover,.ctrl-btn.active{
  background:rgba(245,166,35,0.22);
  color:var(--gold);border-color:var(--gold);
}
.speed-select{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.22);
  color:rgba(255,255,255,0.9);padding:4px 7px;
  border-radius:4px;font-size:clamp(10px,1.3vw,12px);
  font-family:'Poppins',sans-serif;cursor:pointer;outline:none;
}
.speed-select:focus{border-color:var(--gold);}
.speed-select option{background:#2e7d32;color:white;}

/* ── Ticker ── */
.ticker-bar{
  flex-shrink:0;
  background:var(--bg-ticker);border-top:2px solid var(--gold);
  display:flex;align-items:stretch;overflow:hidden;
  height:var(--ticker-h);z-index:10;
}
.ticker-label{
  background:var(--gold);color:var(--g-dark);
  padding:0 13px;font-family:'Teko',sans-serif;
  font-size:clamp(13px,2vw,17px);font-weight:700;
  letter-spacing:1px;display:flex;align-items:center;
  white-space:nowrap;flex-shrink:0;
}
.ticker-scroll{flex:1;overflow:hidden;display:flex;align-items:center;}
.ticker-inner{display:flex;white-space:nowrap;animation:ticker-move 40s linear infinite;}
.ticker-inner:hover{animation-play-state:paused;}
@keyframes ticker-move{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{
  display:inline-flex;align-items:center;gap:7px;
  padding:0 22px;font-family:'Poppins',sans-serif;
  font-size:clamp(10px,1.4vw,12px);
  color:rgba(255,255,255,0.92);
  border-right:1px solid rgba(255,255,255,0.14);
}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;}

/* ═══════════════════════════════════════════════
   RESPONSIVE — TABLET  (max 900px)
   Stack brand on top, news below. Full width both.
═══════════════════════════════════════════════ */
@media(max-width:900px){
  html,body{overflow-y:auto;height:auto;}
  .page{
    flex-direction:column;
    width:100%;height:auto;min-height:100vh;overflow:visible;
  }

  /* left panel: full width, auto height */
  .brand-panel{
    width:100%;height:auto;min-height:auto;
    border-right:none;
    border-bottom:3px solid var(--gold);
  }

  /* top bar: logo still left, name still centred */
  .brand-top{
    padding:10px 12px 8px;
    flex-direction:row;align-items:center;gap:0;
  }
  .logo-wrap{
    width:clamp(58px,12vw,82px);
    height:clamp(58px,12vw,82px);
  }
  .brand-name{font-size:clamp(18px,5.5vw,30px);}
  .brand-tagline{font-size:clamp(9px,2vw,12px);}

  /* product box — fixed generous height on tablet */
  .prod-box-wrap{
    flex:none;
    height:clamp(220px,42vw,380px);
    padding:8px 10px;
  }

  /* badges horizontal on tablet */
  .brand-badges{
    flex-direction:row;flex-wrap:wrap;
    gap:6px;padding:7px 10px 8px;
  }
  .badge{flex:1 1 auto;min-width:120px;}

  /* right panel: full width, min 65vh */
  .news-panel{width:100%;height:auto;min-height:65vh;}
  .media-area{min-height:240px;}
  .news-title-bar{font-size:clamp(12px,3.5vw,17px);}
}

/* ═══════════════════════════════════════════════
   RESPONSIVE — MOBILE  (max 540px)
═══════════════════════════════════════════════ */
@media(max-width:540px){
  .brand-top{padding:8px 10px 6px;}
  .logo-wrap{width:52px;height:52px;}
  .brand-name{font-size:clamp(16px,5.8vw,24px);}
  .brand-tagline{display:none;}
  .brand-divider{display:none;}

  .prod-box-wrap{
    height:clamp(190px,52vw,320px);
    padding:6px 8px;
  }

  .brand-badges{
    flex-direction:row;flex-wrap:wrap;
    gap:5px;padding:6px 8px 7px;
  }
  .badge{flex:1 1 auto;min-width:100px;font-size:9px;padding:4px 9px;}
  .badge-icon{font-size:12px;}

  .live-bar{padding:4px 10px 6px;}
  .live-text{font-size:8px;}

  .news-header{padding:6px 10px;flex-wrap:nowrap;}
  .news-title-bar{display:none;}
  .breaking-tag{font-size:11px;padding:2px 8px;}
  .news-clock{font-size:12px;}

  .controls-bar{padding:7px 10px;gap:7px;}
  .ticker-label{padding:0 8px;font-size:12px;}
  .ticker-item{padding:0 14px;font-size:9px;}

  .media-area{min-height:200px;}
}

/* ═══════════════════════════════════════════════
   RESPONSIVE — LARGE DESKTOP  (min 1440px)
═══════════════════════════════════════════════ */
@media(min-width:1440px){
  .brand-name{font-size:40px;}
  .news-title-bar{font-size:21px;}
  .ticker-item{font-size:13px;}
}
</style>
</head>
<body>
<div class="page">

  <!-- ████████████████████████████████████████████
       LEFT BRAND PANEL
  ████████████████████████████████████████████ -->
  <div class="brand-panel">

    <!-- ── TOP: logo (left-aligned) + name (centred) ── -->
    <div class="brand-top">

      <!-- Logo pinned to left -->
      <div class="logo-wrap">
        <div class="logo-ring"></div>
        <div class="logo-ring2"></div>
        <img class="logo-img" id="logoImg"

    <!-- ── PRODUCT IMAGE BOX — stretches to fill all height ── -->
    <div class="prod-box-wrap">
      <div class="prod-box" id="prodBox">

        <div class="prod-box-label">🌿 Our Products</div>

        <!-- slides injected by JS -->

        <div class="prod-caption" id="prodCaption" style="display:none"></div>

        <div class="prod-nav left"  onclick="prodGo(prodIdx-1)">&#8249;</div>

    <!-- ── BADGES at bottom ── -->
    <div class="brand-badges">

    <div class="live-bar">

    <div class="brand-shimmer"></div>
  </div><!-- /.brand-panel -->


  <!-- ████████████████████████████████████████████
       RIGHT NEWS PANEL
  ████████████████████████████████████████████ -->
  <div class="news-panel">

    <!-- Header -->
    <div class="news-header">
      <div class="breaking-tag">🔴 Breaking</div>
      <div class="news-title-bar">KISAN SAMACHAR | किसान समाचार</div>
      <div class="news-clock" id="clock">--:--:--</div>
    </div>

    <!-- Media area -->
    <div class="media-area">
      <div class="media-bg"></div>
      <div class="media-grid"></div>
      <div class="media-nav-r left"  onclick="navigateMedia(-1)">&#8249;</div>
      <div class="media-nav-r right" onclick="navigateMedia(1)">&#8250;</div>
      <div class="media-display" id="mediaDisplay">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">📷</div>
          <div class="empty-text">
            Select images or videos below<br>to start your broadcast display
          </div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-bar">
      <label class="upload-btn" for="fileInput">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        Select Files
      </label>
      <input type="file" id="fileInput" accept="image/*,video/*" multiple
             onchange="handleFiles(this.files)">

      <div class="slide-controls">
        <button class="ctrl-btn" onclick="navigateMedia(-1)" title="Previous">&#10094;</button>
        <button class="ctrl-btn active" id="playCtrl" onclick="toggleAutoplay()" title="Play/Pause">⏸</button>
        <button class="ctrl-btn" onclick="navigateMedia(1)" title="Next">&#10095;</button>
      </div>

      <select class="speed-select" id="speedSelect" onchange="updateSpeed(this.value)">
        <option value="3000">3s</option>
        <option value="5000" selected>5s</option>
        <option value="8000">8s</option>
        <option value="12000">12s</option>

    <!-- Ticker -->

<!-- ═══════════════════════════════════════════════════════════
     SCRIPT
═══════════════════════════════════════════════════════════ -->
<script>
/* ──────────────────────────────────────────────────────────────
   ▼ PRODUCT IMAGES CONFIGURATION ▼
   ────────────────────────────────────────────────────────────
   Folder:  /home/cdot/Documents/RajuBG/products/

   • Add every product image filename to productImages[].
   • Optionally add a matching caption to productCaptions[].
   • Use "" for no caption on a particular image.
────────────────────────────────────────────────────────────── */
const PRODUCT_BASE = "file:///home/cdot/Documents/RajuBG/products/";

const productImages = [
  "Gb11.jpeg",
  "Arawali.jpeg",
  "Ahaan9955.jpeg",
  /* ─── add more filenames below ─── */
  /* "product4.jpg",  */
  /* "product5.jpeg", */
  /* "product6.png",  */
];

 const productCaptions = [
 /* "GB-11 Hybrid Seeds",
  "Arawali Premium Range",
  "Ahaan 9955 Series",
  /* "",              */
]; 

/* ── Logo fallback: try other extensions if default fails ── */
const _logoExts = ["jpeg","jpg","png","webp","svg"];
let _logoTry = 0;
function tryLogoFallback(img) {
  _logoTry++;
  if (_logoTry < _logoExts.length) {
    img.src = PRODUCT_BASE + "logo." + _logoExts[_logoTry];
  } else {
    img.style.opacity = "0"; /* hide broken image */
  }
}

/* ══════════════════════════════════════════════
   LEFT PANEL — PRODUCT SLIDESHOW
══════════════════════════════════════════════ */
let prodIdx   = 0;
let prodTimer = null;
const PROD_MS = 4500;

function buildProductSlides() {
  const box     = document.getElementById("prodBox");
  const dots    = document.getElementById("prodDots");
  const caption = document.getElementById("prodCaption");
  const noProd  = document.getElementById("noProducts");

  if (!productImages.length) {
    noProd.style.display = "flex";
    return;
  }
  noProd.style.display = "none";

  productImages.forEach((fname, i) => {
    /* slide div */
    const slide = document.createElement("div");
    slide.className = "prod-slide" + (i === 0 ? " active" : "");

    /* image */
    const img = document.createElement("img");
    img.src     = PRODUCT_BASE + fname;
    img.alt     = productCaptions[i] || "Product " + (i + 1);
    img.loading = "lazy";
    img.onerror = () => {
      /* coloured placeholder if image can't load */
      slide.style.background = `hsl(${115 + i * 38},38%,24%)`;
      img.style.display = "none";
    };
    slide.appendChild(img);

    /* insert before caption bar (keeps z-order) */
    box.insertBefore(slide, caption);

    /* dot */
    const dot = document.createElement("div");
    dot.className = "pdot" + (i === 0 ? " active" : "");
    dot.onclick = () => { clearInterval(prodTimer); prodGo(i); startProdLoop(); };
    dots.appendChild(dot);
  });

  setCaption(0);
  startProdLoop();
}

function prodGo(n) {
  const slides = document.querySelectorAll(".prod-slide");
  const dotEls = document.querySelectorAll("#prodDots .pdot");
  if (!slides.length) return;
  slides[prodIdx].classList.remove("active");
  if (dotEls[prodIdx]) dotEls[prodIdx].classList.remove("active");
  prodIdx = ((n % slides.length) + slides.length) % slides.length;
  slides[prodIdx].classList.add("active");
  if (dotEls[prodIdx]) dotEls[prodIdx].classList.add("active");
  setCaption(prodIdx);
}

function setCaption(idx) {
  const bar = document.getElementById("prodCaption");
  const cap = (productCaptions[idx] || "").trim();
  bar.textContent   = cap;
  bar.style.display = cap ? "" : "none";
}

function startProdLoop() {
  clearInterval(prodTimer);
  if (productImages.length > 1)
    prodTimer = setInterval(() => prodGo(prodIdx + 1), PROD_MS);
}

/* ══════════════════════════════════════════════
   CLOCK
══════════════════════════════════════════════ */
function updateClock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-IN", { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

/* ══════════════════════════════════════════════
   SCROLLING TICKER
══════════════════════════════════════════════ */
const tickerMsgs = [
  "🌾 नई बीज किस्म उपलब्ध – उपज में 30% वृद्धि",
  "💧 ड्रिप सिंचाई पर 50% सब्सिडी – अभी आवेदन करें",
  "🌿 जैविक खेती प्रशिक्षण शिविर – 15 मई से शुरू",
  "🚜 किसान क्रेडिट कार्ड – बिना ब्याज 3 लाख तक",
  "🌱 PM Kisan 16वीं किस्त जारी – खाते में राशि चेक करें",
  "🔬 Gangakoshi – नई बायोटेक फसल सुरक्षा उत्पाद लॉन्च",
  "📊 मंडी: गेहूं ₹2150 | धान ₹2183 | सरसों ₹5400/क्विंटल",
  "☀️ मौसम: अगले 7 दिन आंशिक बादल – सिंचाई योजना बनाएं",
  "🏆 सर्वश्रेष्ठ किसान पुरस्कार 2025 – नामांकन शुरू",
  "🌻 सूरजमुखी खेती पर विशेष बोनस – रजिस्ट्रेशन खुला"
];
(function buildTicker() {
  const inner = document.getElementById("tickerInner");
  let h = "";
  for (let pass = 0; pass < 2; pass++)
    tickerMsgs.forEach(m =>
      h += `<span class="ticker-item"><span class="tdot"></span>${m}</span>`);
  inner.innerHTML = h;
})();

/* ══════════════════════════════════════════════
   RIGHT PANEL — BROADCAST MEDIA
══════════════════════════════════════════════ */
const mediaFiles = [];
let ci = 0, autoplay = true, stimer = null, spd = 5000;

function handleFiles(files) {
  if (!files || !files.length) return;
  /* release old object URLs */
  mediaFiles.forEach(m => URL.revokeObjectURL(m.url));
  mediaFiles.length = 0; ci = 0;
  Array.from(files).forEach(f => mediaFiles.push({
    url:  URL.createObjectURL(f),
    type: f.type.startsWith("video") ? "video" : "image"
  }));
  showMedia(0);
  if (autoplay) startSS();
}

function showMedia(idx) {
  if (!mediaFiles.length) return;
  ci = ((idx % mediaFiles.length) + mediaFiles.length) % mediaFiles.length;
  const m     = mediaFiles[ci];
  const disp  = document.getElementById("mediaDisplay");
  const empty = document.getElementById("emptyState");
  empty.style.display = "none";
  disp.innerHTML = "";
  disp.appendChild(empty);

  if (m.type === "image") {
    const img = document.createElement("img");
    img.src = m.url; img.className = "media-item"; img.style.opacity = "0";
    disp.appendChild(img);
    setTimeout(() => { img.style.opacity = "1"; }, 40);
  } else {
    const vid = document.createElement("video");
    vid.src = m.url; vid.className = "media-video";
    vid.controls = true; vid.autoplay = true; vid.playsInline = true;
    vid.muted = false;
    disp.appendChild(vid);
  }
}

function navigateMedia(dir) {
  if (!mediaFiles.length) return;
  stopSS(); showMedia(ci + dir);
  if (autoplay) startSS();
}
function startSS() {
  stopSS();
  if (mediaFiles.length > 1)
    stimer = setInterval(() => showMedia(ci + 1), spd);
}
function stopSS() { if (stimer) { clearInterval(stimer); stimer = null; } }

function toggleAutoplay() {
  autoplay = !autoplay;
  const b = document.getElementById("playCtrl");
  b.textContent = autoplay ? "⏸" : "▶";
  b.classList.toggle("active", autoplay);
  autoplay ? startSS() : stopSS();
}
function updateSpeed(v) {
  spd = parseInt(v, 10);
  if (autoplay && mediaFiles.length > 1) startSS();
}

/* ── INIT ── */
buildProductSlides();
</script>
</body>
</html>
