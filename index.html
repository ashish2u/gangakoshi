<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gangakoshi Kisan Tak</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Teko:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   RESET & ROOT
══════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  /* Light green palette */
  --bg-page:        #e8f5e9;
  --bg-brand:       linear-gradient(170deg, #a5d6a7 0%, #66bb6a 30%, #43a047 65%, #2e7d32 100%);
  --bg-news:        #f1f8e9;
  --bg-header:      linear-gradient(135deg, #388e3c, #66bb6a);
  --bg-controls:    linear-gradient(135deg, #388e3c, #2e7d32);
  --bg-ticker:      #43a047;
  --bg-media:       #c8e6c9;

  --gold:           #f5a623;
  --gold-dim:       rgba(245,166,35,0.4);
  --green-dark:     #1b5e20;
  --green-mid:      #388e3c;
  --green-light:    #81c784;
  --white:          #ffffff;
  --text-dark:      #1b5e20;
  --text-mid:       #2e7d32;
  --text-light:     rgba(255,255,255,0.9);
  --text-muted:     rgba(255,255,255,0.6);

  --brand-w:        33.333%;
  --news-w:         66.667%;
}

html { font-size: 16px; }
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg-page);
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══════════════════════════════════════════
   DESKTOP LAYOUT  (≥768px) — side by side
══════════════════════════════════════════ */
.page {
  display: flex;
  flex-direction: row;
  width: 100%;
  min-height: 100vh;
}

/* ══════════════════════════════════════════
   LEFT BRAND PANEL
══════════════════════════════════════════ */
.brand-panel {
  width: var(--brand-w);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--bg-brand);
  border-right: 3px solid var(--gold);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.brand-panel::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 30px 30px;
  pointer-events: none;
}

.brand-shimmer {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  background-size: 200% 100%;
  animation: shimmer 3s linear infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── Logo + Name ── */
.brand-top {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; padding: 20px 16px 12px; z-index: 2; width: 100%;
}

.logo-wrap {
  position: relative;
  width: clamp(70px, 12vw, 100px);
  height: clamp(70px, 12vw, 100px);
  display: flex; align-items: center; justify-content: center;
}
.logo-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: var(--gold);
  border-right-color: rgba(245,166,35,0.3);
  animation: spin 6s linear infinite;
}
.logo-ring2 {
  position: absolute; inset: 6px; border-radius: 50%;
  border: 1px solid transparent;
  border-bottom-color: var(--green-light);
  border-left-color: rgba(255,255,255,0.3);
  animation: spin 9s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }

.logo-img {
  width: 82%; height: 82%;
  border-radius: 50%; object-fit: cover;
  border: 2px solid rgba(245,166,35,0.6);
  background: white; z-index: 2;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.brand-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: clamp(18px, 3.5vw, 34px);
  color: var(--white);
  letter-spacing: 2px;
  line-height: 1.05;
  text-align: center;
  text-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.brand-name .hl { color: var(--gold); }

.brand-divider {
  width: 70%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin-top: 4px;
}

/* ── Crop/Drone Slideshow ── */
.brand-slides {
  flex: 1; width: 100%;
  position: relative; overflow: hidden; z-index: 2;
  min-height: 180px;
}
.bslide {
  position: absolute; inset: 0;
  opacity: 0; transition: opacity 1.2s ease;
}
.bslide.active { opacity: 1; }
.bslide svg { width: 100%; height: 100%; display: block; }

.slide-dots {
  position: absolute; bottom: 8px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 5;
}
.sdot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: background 0.3s, transform 0.3s;
  cursor: pointer;
}
.sdot.active { background: var(--gold); transform: scale(1.3); }

/* ── Badges ── */
.brand-badges {
  display: flex; flex-direction: column;
  gap: 7px; padding: 10px 14px 12px;
  width: 100%; z-index: 2;
}
.badge {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(245,166,35,0.3);
  border-left: 3px solid var(--gold);
  border-radius: 5px;
  padding: 7px 12px;
  font-family: 'Poppins', sans-serif;
  font-size: clamp(10px, 1.2vw, 13px);
  font-weight: 500;
  color: var(--white);
  letter-spacing: 0.5px;
  backdrop-filter: blur(4px);
}
.badge-icon { font-size: 15px; }

.live-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 7px;
  border-top: 1px solid rgba(245,166,35,0.25);
  z-index: 2; width: 100%;
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #69ff99;
  box-shadow: 0 0 8px #69ff99;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.live-text {
  font-family: 'Poppins', sans-serif; font-size: 10px;
  color: rgba(255,255,255,0.6); letter-spacing: 1.5px; text-transform: uppercase;
}

/* ══════════════════════════════════════════
   RIGHT NEWS PANEL
══════════════════════════════════════════ */
.news-panel {
  width: var(--news-w);
  min-height: 100vh;
  display: flex; flex-direction: column;
  background: var(--bg-news);
  position: relative; overflow: hidden;
}

/* ── Top header ── */
.news-header {
  background: var(--bg-header);
  padding: 10px 16px;
  display: flex; align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--gold);
  flex-shrink: 0; z-index: 10;
  gap: 8px; flex-wrap: wrap;
}
.breaking-tag {
  background: #e53935; color: white;
  font-family: 'Teko', sans-serif;
  font-size: clamp(12px, 2vw, 16px);
  letter-spacing: 2px; padding: 3px 12px;
  border-radius: 3px; text-transform: uppercase;
  font-weight: 600;
  animation: blink-tag 2s step-end infinite;
  white-space: nowrap;
}
@keyframes blink-tag { 0%,100%{opacity:1} 50%{opacity:0.55} }
.news-title-bar {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(13px, 2.2vw, 19px);
  color: var(--gold); letter-spacing: 2px;
  font-weight: 600; flex: 1; text-align: center;
}
.news-clock {
  font-family: 'Teko', sans-serif;
  font-size: clamp(13px, 1.8vw, 17px);
  color: rgba(255,255,255,0.8); letter-spacing: 1px;
  white-space: nowrap;
}

/* ── Media area ── */
.media-area {
  flex: 1; position: relative;
  overflow: hidden;
  background: var(--bg-media);
  display: flex; align-items: center; justify-content: center;
  min-height: 200px;
}
.media-bg-pattern {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(76,175,80,0.15) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 20%, rgba(129,199,132,0.12) 0%, transparent 55%);
  pointer-events: none; z-index: 0;
}
.media-grid-overlay {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(56,142,60,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,142,60,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
.media-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 6;
  background: rgba(27,94,32,0.55);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  width: clamp(30px, 5vw, 40px);
  height: clamp(50px, 8vw, 70px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: clamp(16px, 2.5vw, 22px);
  transition: background 0.2s; border-radius: 3px;
  user-select: none; -webkit-user-select: none;
}
.media-nav:hover, .media-nav:active { background: rgba(245,166,35,0.35); }
.media-nav.left { left: 8px; }
.media-nav.right { right: 8px; }

.media-display {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
}
.media-item {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: opacity 0.8s ease;
}
.media-video {
  width: 100%; height: 100%;
  object-fit: cover;
}
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  z-index: 3; text-align: center; padding: 20px;
}
.empty-icon {
  width: clamp(60px, 10vw, 80px);
  height: clamp(60px, 10vw, 80px);
  border: 2px dashed rgba(56,142,60,0.5);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(22px, 4vw, 34px);
  color: var(--green-mid);
  animation: pulse-ring 2s ease-in-out infinite;
}
@keyframes pulse-ring { 0%,100%{box-shadow:0 0 0 0 rgba(56,142,60,0.2)} 50%{box-shadow:0 0 0 14px rgba(56,142,60,0)} }
.empty-text {
  font-family: 'Poppins', sans-serif;
  font-size: clamp(11px, 2vw, 14px);
  color: var(--green-mid); line-height: 1.5;
}

/* ── Controls bar ── */
.controls-bar {
  background: var(--bg-controls);
  padding: 10px 14px;
  display: flex; align-items: center;
  gap: 10px; flex-wrap: wrap;
  border-top: 2px solid var(--gold);
  flex-shrink: 0; z-index: 10;
}
.upload-btn {
  display: flex; align-items: center; gap: 7px;
  background: linear-gradient(135deg, #66bb6a, #388e3c);
  border: 1px solid var(--gold); color: white;
  padding: 8px 16px; border-radius: 4px;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  font-size: clamp(11px, 1.5vw, 13px);
  font-weight: 500; letter-spacing: 0.5px;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap; user-select: none;
}
.upload-btn:hover { background: linear-gradient(135deg, #81c784, #66bb6a); transform: translateY(-1px); }
.upload-btn:active { transform: translateY(0); }
.upload-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
#file-input { display: none; }

.slide-controls {
  display: flex; align-items: center; gap: 7px;
}
.ctrl-btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.85);
  width: clamp(30px, 5vw, 36px);
  height: clamp(30px, 5vw, 36px);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: clamp(12px, 2vw, 16px);
  transition: background 0.2s, color 0.2s;
  user-select: none;
}
.ctrl-btn:hover, .ctrl-btn.active {
  background: rgba(245,166,35,0.25);
  color: var(--gold); border-color: var(--gold);
}

.speed-select {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.85);
  padding: 5px 8px; border-radius: 4px;
  font-size: clamp(10px, 1.4vw, 12px);
  font-family: 'Poppins', sans-serif;
  cursor: pointer; outline: none;
}
.speed-select:focus { border-color: var(--gold); }
.speed-select option { background: #2e7d32; color: white; }

/* ── Ticker ── */
.ticker-bar {
  background: var(--bg-ticker);
  border-top: 2px solid var(--gold);
  display: flex; align-items: stretch;
  overflow: hidden;
  height: clamp(32px, 5vw, 40px);
  flex-shrink: 0; z-index: 10;
}
.ticker-label {
  background: var(--gold); color: var(--green-dark);
  padding: 0 14px;
  font-family: 'Teko', sans-serif;
  font-size: clamp(13px, 2.2vw, 18px);
  font-weight: 700; letter-spacing: 1px;
  display: flex; align-items: center;
  white-space: nowrap; flex-shrink: 0;
}
.ticker-scroll {
  flex: 1; overflow: hidden;
  display: flex; align-items: center;
}
.ticker-inner {
  display: flex; white-space: nowrap;
  animation: ticker-move 40s linear infinite;
}
.ticker-inner:hover { animation-play-state: paused; }
@keyframes ticker-move { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ticker-item {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0 24px;
  font-family: 'Poppins', sans-serif;
  font-size: clamp(10px, 1.5vw, 12px);
  color: rgba(255,255,255,0.92);
  border-right: 1px solid rgba(255,255,255,0.15);
}
.tdot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

/* ══════════════════════════════════════════
   SVG ILLUSTRATIONS (inside left panel)
══════════════════════════════════════════ */
/* All SVG slides use the same preserveAspectRatio so they fill nicely */

/* ══════════════════════════════════════════
   RESPONSIVE: TABLET  (< 768px)
   Stack vertically: brand on top, news below
══════════════════════════════════════════ */
@media (max-width: 767px) {
  body { overflow-x: hidden; overflow-y: auto; }

  .page {
    flex-direction: column;
    min-height: 100vh;
  }

  .brand-panel {
    width: 100%;
    min-height: auto;
    flex-direction: row;           /* horizontal row on mobile */
    align-items: stretch;
    border-right: none;
    border-bottom: 3px solid var(--gold);
  }

  /* On mobile: left side = logo+name, right side = badges */
  .brand-top {
    flex-direction: column;
    padding: 14px 14px 10px;
    gap: 8px;
    width: auto;
    flex: 0 0 auto;
    justify-content: center;
    border-right: 1px solid rgba(245,166,35,0.3);
  }

  .logo-wrap {
    width: clamp(56px, 15vw, 80px);
    height: clamp(56px, 15vw, 80px);
  }

  .brand-name { font-size: clamp(13px, 4vw, 20px); }

  .brand-slides {
    display: none;  /* hide SVG slides on mobile to save space */
  }

  .brand-badges {
    flex: 1;
    flex-direction: column;
    justify-content: center;
    padding: 10px 12px;
    gap: 6px;
  }

  .live-bar {
    display: none; /* hide on tiny screens */
  }

  .news-panel {
    width: 100%;
    min-height: 70vh;
    flex: 1;
  }

  .news-header {
    flex-wrap: nowrap;
    gap: 6px;
    padding: 8px 10px;
  }

  .news-title-bar {
    display: none; /* too crowded on small screens */
  }

  .media-area {
    min-height: 220px;
  }

  .controls-bar {
    padding: 8px 10px;
    gap: 8px;
    flex-wrap: wrap;
  }
}

/* ══════════════════════════════════════════
   RESPONSIVE: SMALL MOBILE  (< 480px)
══════════════════════════════════════════ */
@media (max-width: 480px) {
  .brand-panel {
    flex-direction: column;
  }

  .brand-top {
    flex-direction: row;
    width: 100%;
    border-right: none;
    border-bottom: 1px solid rgba(245,166,35,0.3);
    padding: 10px 14px;
    gap: 12px;
    align-items: center;
  }

  .logo-wrap {
    width: 52px; height: 52px; flex-shrink: 0;
  }

  .brand-name { font-size: clamp(15px, 5vw, 22px); text-align: left; }
  .brand-divider { display: none; }

  .brand-badges {
    flex-direction: row;
    flex-wrap: wrap;
    padding: 8px 12px 10px;
    gap: 6px;
  }

  .badge {
    flex: 1 1 auto;
    min-width: 110px;
    padding: 5px 10px;
    font-size: 11px;
  }

  .ticker-label { padding: 0 8px; font-size: 12px; }
  .ticker-item { padding: 0 16px; font-size: 10px; }

  .media-area { min-height: 180px; }
}

/* ══════════════════════════════════════════
   RESPONSIVE: LARGE / FULL HD  (≥ 1440px)
══════════════════════════════════════════ */
@media (min-width: 1440px) {
  .brand-name { font-size: 38px; }
  .news-title-bar { font-size: 22px; }
  .ticker-item { font-size: 13px; }
}
</style>
</head>
<body>
<div class="page">

  <!-- ═══════════ LEFT BRAND PANEL ═══════════ -->
  <div class="brand-panel">

    <!-- Logo + Name -->
    <div class="brand-top">
      <div class="logo-wrap">
        <div class="logo-ring"></div>
        <div class="logo-ring2"></div>
        <img class="logo-img" src="Image/logo.png" alt="Gangakoshi Kisan Tak Logo"
          onerror="this.style.display='none'">
      </div>
      <div class="brand-name">GANGAKOSHI<br><span class="hl">KISAN TAK</span></div>
      <div class="brand-divider"></div>
    </div>

    <!-- SVG Crop / Drone Slideshow -->
    <div class="brand-slides" id="brandSlides">

      <!-- SLIDE 1: Paddy Field -->
      <div class="bslide active">
        <svg viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
          <defs>

          </defs>

          <polygon points="0,145 55,75 110,135 175,65 240,115 300,80 300,145" fill="rgba(56,142,60,0.4)"/>
          <rect x="0" y="195" width="300" height="125" fill="url(#s1water)" opacity="0.35"/>
          <!-- Paddy stalks row1 -->
          <g fill="#2e7d32">
            <ellipse cx="15" cy="196" rx="3" ry="20"/><ellipse cx="38" cy="193" rx="3" ry="22"/>
            <ellipse cx="61" cy="196" rx="3" ry="20"/><ellipse cx="84" cy="192" rx="3" ry="23"/>
            <ellipse cx="107" cy="196" rx="3" ry="20"/><ellipse cx="130" cy="193" rx="3" ry="22"/>
            <ellipse cx="153" cy="196" rx="3" ry="20"/><ellipse cx="176" cy="192" rx="3" ry="23"/>
            <ellipse cx="199" cy="196" rx="3" ry="20"/><ellipse cx="222" cy="193" rx="3" ry="22"/>
            <ellipse cx="245" cy="196" rx="3" ry="20"/><ellipse cx="268" cy="192" rx="3" ry="23"/>
          </g>
          <g fill="#f9a825" opacity="0.9">
            <ellipse cx="15" cy="177" rx="2" ry="7" transform="rotate(14 15 177)"/>

            <ellipse cx="61" cy="177" rx="2" ry="7" transform="rotate(12 61 177)"/>
            <ellipse cx="84" cy="171" rx="2" ry="7" transform="rotate(-9 84 171)"/>
            <ellipse cx="107" cy="177" rx="2" ry="7" transform="rotate(14 107 177)"/>
            <ellipse cx="130" cy="173" rx="2" ry="7" transform="rotate(-11 130 173)"/>
            <ellipse cx="153" cy="177" rx="2" ry="7" transform="rotate(12 153 177)"/>
            <ellipse cx="176" cy="171" rx="2" ry="7" transform="rotate(-9 176 171)"/>
            <ellipse cx="199" cy="177" rx="2" ry="7" transform="rotate(13 199 177)"/>
            <ellipse cx="222" cy="173" rx="2" ry="7" transform="rotate(-10 222 173)"/>
            <ellipse cx="245" cy="177" rx="2" ry="7" transform="rotate(12 245 177)"/>
          </g>
          <g fill="#1b5e20">
            <ellipse cx="8" cy="228" rx="3.5" ry="24"/><ellipse cx="32" cy="224" rx="3.5" ry="26"/>
            <ellipse cx="56" cy="228" rx="3.5" ry="24"/><ellipse cx="80" cy="223" rx="3.5" ry="27"/>

          <text x="150" y="304" text-anchor="middle" font-family="'Rajdhani',sans-serif" font-size="14" font-weight="700" fill="#f5a623" letter-spacing="2">✈ DRONE CROP SPRAYER</text>
        </svg>
      </div>

      <!-- Slide dots -->
      <div class="slide-dots">
        <div class="sdot active"></div>
        <div class="sdot"></div>
        <div class="sdot"></div>
        <div class="sdot"></div>
        <div class="sdot"></div>
      </div>
    </div><!-- /.brand-slides -->

    <!-- Badges -->
    <div class="brand-badges">
      <div class="badge"><span class="badge-icon">🌱</span> Agri-Biotech</div>
      <div class="badge"><span class="badge-icon">🚜</span> Smart Farming</div>
      <div class="badge"><span class="badge-icon">🔬</span> Research-Driven</div>
    </div>

    <div class="live-bar">
      <div class="live-dot"></div>
      <div class="live-text">Live Broadcast</div>
    </div>

    <div class="brand-shimmer"></div>
  </div><!-- /.brand-panel -->

  <!-- ═══════════ RIGHT NEWS PANEL ═══════════ -->
  <div class="news-panel">

    <!-- Header -->
    <div class="news-header">
      <div class="breaking-tag">🔴 Breaking</div>
      <div class="news-title-bar">KISAN SAMACHAR | किसान समाचार</div>
      <div class="news-clock" id="clock">--:--:--</div>
    </div>

    <!-- Media display area -->
    <div class="media-area">
      <div class="media-bg-pattern"></div>
      <div class="media-grid-overlay"></div>
      <div class="media-nav left" onclick="navigateMedia(-1)">&#8249;</div>
      <div class="media-nav right" onclick="navigateMedia(1)">&#8250;</div>
      <div class="media-display" id="media-display">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">📷</div>
          <div class="empty-text">Select images or videos below<br>to start your broadcast display</div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-bar">
      <label class="upload-btn" for="file-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        Select Files
      </label>
      <input type="file" id="file-input" accept="image/*,video/*" multiple onchange="handleFiles(this.files)">

      <div class="slide-controls">
        <button class="ctrl-btn" onclick="navigateMedia(-1)" title="Previous">&#10094;</button>
        <button class="ctrl-btn active" id="play-ctrl" onclick="toggleAutoplay()" title="Play / Pause">⏸</button>
        <button class="ctrl-btn" onclick="navigateMedia(1)" title="Next">&#10095;</button>
      </div>

      <select class="speed-select" id="speed-select" onchange="updateSpeed(this.value)" title="Slide speed">
        <option value="3000">3s</option>
        <option value="5000" selected>5s</option>
        <option value="8000">8s</option>
        <option value="12000">12s</option>
      </select>
    </div>

    <!-- Scrolling ticker -->
    <div class="ticker-bar">
      <div class="ticker-label">📢 Kisan Update</div>
      <div class="ticker-scroll">
        <div class="ticker-inner" id="ticker-inner"></div>
      </div>
    </div>

  </div><!-- /.news-panel -->
</div><!-- /.page -->

<script>
/* ── LEFT PANEL SLIDESHOW ── */
const bslides = document.querySelectorAll('.bslide');
const sdots   = document.querySelectorAll('.sdot');
let bi = 0;

function showBSlide(n) {
  bslides[bi].classList.remove('active');
  sdots[bi].classList.remove('active');
  bi = (n + bslides.length) % bslides.length;
  bslides[bi].classList.add('active');
  sdots[bi].classList.add('active');
}
sdots.forEach((d, i) => d.onclick = () => showBSlide(i));
setInterval(() => showBSlide(bi + 1), 4200);

/* ── LIVE CLOCK ── */
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-IN', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

/* ── TICKER ── */
const tickerMsgs = [
  "🌾 नई बीज किस्म उपलब्ध – उपज में 30% वृद्धि",
  "💧 ड्रिप सिंचाई पर 50% सब्सिडी – अभी आवेदन करें",
  "🌿 जैविक खेती प्रशिक्षण शिविर – 15 मई से शुरू",
  "🚜 किसान क्रेडिट कार्ड – बिना ब्याज 3 लाख तक",
  "🌱 PM Kisan 16वीं किस्त जारी – खाते में राशि चेक करें",
  "🔬 Gangakoshi – नई बायोटेक फसल सुरक्षा उत्पाद लॉन्च",
  "📊 मंडी: गेहूं ₹2150 | धान ₹2183 | सरसों ₹5400/क्विंटल",
  "☀️ मौसम: अगले 7 दिन आंशिक बादल – सिंचाई योजना बनाएं",
  "🏆 सर्वश्रेष्ठ किसान पुरस्कार 2025 – नामांकन शुरू",
  "🌻 सूरजमुखी खेती पर विशेष बोनस – रजिस्ट्रेशन खुला"
];
(function buildTicker() {
  const inner = document.getElementById('ticker-inner');
  let h = '';
  for (let i = 0; i < 2; i++)
    tickerMsgs.forEach(m => h += `<span class="ticker-item"><span class="tdot"></span>${m}</span>`);
  inner.innerHTML = h;
})();

/* ── RIGHT PANEL MEDIA ── */
const mediaFiles = [];
let ci = 0, autoplay = true, stimer = null, spd = 5000;

function handleFiles(files) {
  if (!files || !files.length) return;
  mediaFiles.length = 0; ci = 0;
  Array.from(files).forEach(f => mediaFiles.push({
    url: URL.createObjectURL(f),
    type: f.type.startsWith('video') ? 'video' : 'image'
  }));
  showMedia(0);
  if (autoplay) startSS();
}

function showMedia(idx) {
  if (!mediaFiles.length) return;
  ci = (idx + mediaFiles.length) % mediaFiles.length;
  const m = mediaFiles[ci];
  const disp  = document.getElementById('media-display');
  const empty = document.getElementById('empty-state');
  empty.style.display = 'none';
  disp.innerHTML = '';
  disp.appendChild(empty);

  if (m.type === 'image') {
    const img = document.createElement('img');
    img.src = m.url; img.className = 'media-item'; img.style.opacity = '0';
    disp.appendChild(img);
    setTimeout(() => img.style.opacity = '1', 50);
  } else {
    const vid = document.createElement('video');
    vid.src = m.url; vid.className = 'media-video';
    vid.controls = true; vid.autoplay = true; vid.playsInline = true;
    disp.appendChild(vid);
  }
}

function navigateMedia(dir) {
  if (!mediaFiles.length) return;
  stopSS(); showMedia(ci + dir);
  if (autoplay) startSS();
}

function startSS() {
  stopSS();
  if (mediaFiles.length > 1)
    stimer = setInterval(() => showMedia(ci + 1), spd);
}
function stopSS() { if (stimer) { clearInterval(stimer); stimer = null; } }

function toggleAutoplay() {
  autoplay = !autoplay;
  const b = document.getElementById('play-ctrl');
  b.textContent = autoplay ? '⏸' : '▶';
  b.classList.toggle('active', autoplay);
  autoplay ? startSS() : stopSS();
}

function updateSpeed(v) {
  spd = parseInt(v);
  if (autoplay && mediaFiles.length > 1) startSS();
}
</script>
</body>
</html>
